<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4a1942 0%, #1e1b4b 50%, #312e81 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .calculator {
            background: #1e1b4b;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(139, 92, 246, 0.3);
            padding: 20px;
            max-width: 320px;
            width: 100%;
        }
        .display {
            background: #312e81;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: right;
        }
        .display .formula {
            color: #a78bfa;
            font-size: 14px;
            min-height: 20px;
        }
        .display .result {
            color: white;
            font-size: 36px;
            font-weight: bold;
            min-height: 45px;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .btn {
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-number {
            background: #4c1d95;
            color: white;
        }
        .btn-number:hover {
            background: #5b21b6;
        }
        .btn-number:active {
            transform: scale(0.95);
        }
        .btn-operator {
            background: #8b5cf6;
            color: white;
        }
        .btn-operator:hover {
            background: #a78bfa;
        }
        .btn-operator:active {
            transform: scale(0.95);
        }
        .btn-function {
            background: #6366f1;
            color: white;
        }
        .btn-function:hover {
            background: #818cf8;
        }
        .btn-function:active {
            transform: scale(0.95);
        }
        .btn-equals {
            background: #a855f7;
            color: white;
            grid-column: span 2;
        }
        .btn-equals:hover {
            background: #c084fc;
        }
        .btn-equals:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div id="formula" class="formula"></div>
            <div id="result" class="result">0</div>
        </div>
        <div class="buttons">
            <button class="btn btn-function" onclick="clearDisplay()">C</button>
            <button class="btn btn-function" onclick="deleteChar()">DEL</button>
            <button class="btn btn-function" onclick="toggleSign()">+/-</button>
            <button class="btn btn-operator" onclick="setOperator('/')">÷</button>
            
            <button class="btn btn-number" onclick="appendNumber('7')">7</button>
            <button class="btn btn-number" onclick="appendNumber('8')">8</button>
            <button class="btn btn-number" onclick="appendNumber('9')">9</button>
            <button class="btn btn-operator" onclick="setOperator('*')">×</button>
            
            <button class="btn btn-number" onclick="appendNumber('4')">4</button>
            <button class="btn btn-number" onclick="appendNumber('5')">5</button>
            <button class="btn btn-number" onclick="appendNumber('6')">6</button>
            <button class="btn btn-operator" onclick="setOperator('-')">-</button>
            
            <button class="btn btn-number" onclick="appendNumber('1')">1</button>
            <button class="btn btn-number" onclick="appendNumber('2')">2</button>
            <button class="btn btn-number" onclick="appendNumber('3')">3</button>
            <button class="btn btn-operator" onclick="setOperator('+')">+</button>
            
            <button class="btn btn-number" onclick="appendNumber('0')">0</button>
            <button class="btn btn-number" onclick="appendNumber('.')">.</button>
            <button class="btn btn-equals" onclick="calculate()">=</button>
        </div>
    </div>
    <script>
        let currentNumber = '';
        let previousNumber = '';
        let operator = null;
        let shouldReset = false;
        
        function appendNumber(num) {
            if (shouldReset) {
                currentNumber = '';
                shouldReset = false;
            }
            if (num === '.' && currentNumber.includes('.')) return;
            if (currentNumber.length >= 3 && !currentNumber.includes('-')) return;
            currentNumber += num;
            updateDisplay();
        }
        
        function setOperator(op) {
            if (currentNumber === '') return;
            if (previousNumber !== '' && !shouldReset) {
                calculate();
            }
            previousNumber = currentNumber;
            currentNumber = '';
            operator = op;
            shouldReset = false;
            updateFormula();
        }
        
        function calculate() {
            if (previousNumber === '' || currentNumber === '' || operator === null) return;
            
            let result;
            const num1 = parseFloat(previousNumber);
            const num2 = parseFloat(currentNumber);
            
            switch (operator) {
                case '+':
                    result = num1 + num2;
                    break;
                case '-':
                    result = num1 - num2;
                    break;
                case '*':
                    result = num1 * num2;
                    break;
                case '/':
                    if (num2 === 0) {
                        document.getElementById('result').textContent = '错误';
                        document.getElementById('formula').textContent = '';
                        reset();
                        return;
                    }
                    result = num1 / num2;
                    break;
            }
            
            if (!isFinite(result)) {
                document.getElementById('result').textContent = '错误';
                document.getElementById('formula').textContent = '';
                reset();
                return;
            }
            
            result = parseFloat(result.toFixed(8));
            currentNumber = result.toString();
            previousNumber = '';
            operator = null;
            shouldReset = true;
            updateDisplay();
            document.getElementById('formula').textContent = '';
        }
        
        function clearDisplay() {
            currentNumber = '';
            previousNumber = '';
            operator = null;
            shouldReset = false;
            document.getElementById('result').textContent = '0';
            document.getElementById('formula').textContent = '';
        }
        
        function deleteChar() {
            currentNumber = currentNumber.slice(0, -1);
            if (currentNumber === '') {
                document.getElementById('result').textContent = '0';
            } else {
                document.getElementById('result').textContent = currentNumber;
            }
        }
        
        function toggleSign() {
            if (currentNumber === '') return;
            if (currentNumber.startsWith('-')) {
                currentNumber = currentNumber.slice(1);
            } else {
                currentNumber = '-' + currentNumber;
            }
            updateDisplay();
        }
        
        function updateDisplay() {
            document.getElementById('result').textContent = currentNumber || '0';
        }
        
        function updateFormula() {
            const opSymbol = operator === '*' ? '×' : operator === '/' ? '÷' : operator;
            document.getElementById('formula').textContent = previousNumber + ' ' + opSymbol;
        }
        
        function reset() {
            currentNumber = '';
            previousNumber = '';
            operator = null;
            shouldReset = false;
        }
    </script>
</body>
</html>
